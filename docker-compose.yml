services:
  # --- VALIDATOR SERVICE ---
  validator:
    image: awptryd-validator
    container_name: awp-validator-main
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MINE_GATEWAY_PROVIDER=openai
      - MINE_GATEWAY_TOKEN=${CEREBRAS_API_KEY}
      - MINE_GATEWAY_BASE_URL=${BASE_URL}
      - MINE_GATEWAY_MODEL=llama3.1-8b
      - VALIDATOR_PRIVATE_KEY=${VALIDATOR_PRIVATE_KEY}
      - MINER_PRIVATE_KEY=${VALIDATOR_PRIVATE_KEY}
      - IS_VALIDATOR=true
      - MAX_PARALLEL=10
      - DATASET_REFRESH_SECONDS=${DATASET_REFRESH_SECONDS:-2}
      - PYTHONIOENCODING=utf-8
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
    restart: unless-stopped
    networks:
      - awp-network

networks:
  awp-network:
    driver: bridge
